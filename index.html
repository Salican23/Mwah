<!DOCTYPE html>
<html>
<head>
<title>Sally ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff4d88,#ff99cc);
color:white;
text-align:center;
}

#lock{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
text-align:center;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

#main{
display:none;
padding:30px;
}

.heart{
position:fixed;
bottom:-20px;
color:red;
animation:float 6s linear forwards;
}

@keyframes float{
to{
transform:translateY(-110vh);
opacity:0;
}
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="lock">
<h2>Enter Password ❤️</h2>
<input id="pass" placeholder="password">
<button onclick="check()">Enter</button>
</div>

<!-- MAIN SITE -->
<div id="main">

<h1>❤️ Sally ❤️</h1>

<p>
I love you so much Sally. This is all for you ❤️
</p>

</div>

<script>

function check(){
let p = document.getElementById("pass").value;

if(p === "sally"){
document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("Wrong password ❤️");
}
}

// hearts
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},150);

</script>

</body>
</html>
